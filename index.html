<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JYO 教育用テンプレート</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__logo">JYO Template</h1>
      <nav class="header__nav" aria-label="グローバルナビゲーション">
        <ul class="header__list">
          <li class="header__item"><a href="#" class="header__link">Home</a></li>
          <li class="header__item"><a href="#" class="header__link">About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="card-section">
      <h2 class="card-section__title">最新の学習記録</h2>

      <div class="card-section__container">
        <article class="card">
          <div class="card__img-wrapper">
            <img src="https://placehold.jp/300x200.png" alt="HTML5の構造を表した図解" class="card__img">
          </div>
          <div class="card__body">
            <h3 class="card__title">セマンティックタグの基本</h3>
            <p class="card__text">divタグだけでなく、適切なタグを選びましょう。</p>
            <a href="#" class="card__btn card__btn--primary">詳細を見る</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__copyright"><small>&copy; 2026 JYO Project.</small></p>
  </footer>
</body>

</html>
